name: C/C++ CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make g++
      - name: Build script
        run: ./cicd/build.sh
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-binaries
          path: usr/bin/
  test:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run tests
        run: ./cicd/test.sh
  package:
    runs-on: self-hosted
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download build artifacts
        uses: actions/download-artifact@v4
      - name: Install packaging tools
        run: sudo apt-get install -y dpkg-dev
      - name: Create .deb package
        run: ./cicd/package.sh
      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: programm_1,0_all.deb
  
