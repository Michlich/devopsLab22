name: programm
on:
	push:
		branches: - main
	pull_request:
		branches: - main
jobs:
	build:
		runs-on: self-hosted
		steps:
			- name: Install dependencies
			- uses: actions/checkout@v4
				run: |
					sudo apt-get update
					sudo apt-get install -y make g++
			- name: Build script
        			run: ./cicd/build.sh
        		- name: Upload build artifacts
        			uses: actions/upload-artifact@v4
        			with:
					name: built-binaries
					path: usr/bin/
	test:
		runs-on: self-hosted
		needs: build
		steps:
			- uses: actions/checkout@v4
			- name: Download build artifacts
				uses: actions/download-artifact@v4
        			with:
					name: built-binaries
			- name: Run tests
				run: ./cicd/test.sh
	package:
		runs-on: self-hosted
		needs: test
		steps:
			- uses: actions/checkout@v4
			- name: Download build artifacts
				uses: actions/download-artifact@v4
				with:
					name: built-binaries
			- name: Install packaging tools
				run: sudo apt-get install -y dpkg-dev
			- name: Create .deb package
				run: ./cicd/package.sh
			- name: Upload package artifact
				uses: actions/upload-artifact@v4
				with:
					name: deb-package
					path: *.deb
	release:
		runs-on: ubuntu-latest
		needs: package
		steps:
			- uses: actions/checkout@v4
			- name: Download package artifact
				uses: actions/download-artifact@v4
				with:
					name: deb-package
			- name: Create GitHub Release
				uses: ncipollo/release-action@v1
				with:
					token: ${{ secrets.GITHUB_TOKEN }}
					artifacts: "*.deb"
					tag: v1.0.0
					name: "Release v1.0.0"
          				body: "Release v1.0.0 programm"
